services:
  - type: web
    name: race-poster-api
    runtime: python
    rootDir: backend
    buildCommand: pip3 install -r requirements.txt
    startCommand: /opt/render/project/src/.venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
    plan: free
